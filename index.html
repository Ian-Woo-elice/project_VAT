<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CXO VAT 계산기</title>
  <style>
    :root {
      /* Color Palette */
      --bg-body: #f3f4f6;
      --bg-card: #ffffff;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      
      --brand: #2563eb;       /* 신뢰감을 주는 블루 */
      --brand-hover: #1d4ed8;
      --brand-light: #eff6ff;
      
      --success: #10b981;     /* 복사 성공 시 녹색 */
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --focus-ring: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-body: #111827;
        --bg-card: #1f2937;
        --text-primary: #f9fafb;
        --text-secondary: #9ca3af;
        --border: #374151;
        --brand: #60a5fa;
        --brand-hover: #93c5fd;
        --brand-light: rgba(96, 165, 250, 0.1);
        --focus-ring: 0 0 0 3px rgba(96, 165, 250, 0.25);
      }
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .app-container {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border-radius: 20px;
      box-shadow: var(--shadow-md);
      padding: 32px 28px;
      border: 1px solid var(--border);
    }

    /* Header */
    header { text-align: center; margin-bottom: 28px; }
    h1 { margin: 0 0 6px; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    p.subtitle { margin: 0; color: var(--text-secondary); font-size: 13px; }

    /* Custom Toggle Tab */
    .toggle-group {
      display: flex;
      background: var(--bg-body);
      padding: 4px;
      border-radius: 12px;
      margin-bottom: 24px;
      position: relative;
    }
    .toggle-btn {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      z-index: 2;
      transition: color 0.2s;
      border-radius: 8px;
    }
    .toggle-btn[aria-selected="true"] {
      color: var(--brand);
    }
    
    /* Sliding Background for Tabs */
    .toggle-bg {
      position: absolute;
      top: 4px; left: 4px; bottom: 4px;
      width: calc(50% - 4px);
      background: var(--bg-card);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
      z-index: 1;
    }

    /* Input Area */
    .input-area { margin-bottom: 32px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .input-wrapper { position: relative; }
    
    input[type="text"] {
      width: 100%;
      padding: 18px 44px 18px 16px;
      font-size: 24px;
      font-weight: 700;
      text-align: right;
      border: 2px solid var(--border);
      border-radius: 14px;
      background: var(--bg-card);
      color: var(--text-primary);
      outline: none;
      transition: all 0.2s;
      letter-spacing: -0.5px;
    }
    
    input[type="text"]::placeholder { color: var(--text-secondary); opacity: 0.4; }
    
    input[type="text"]:focus {
      border-color: var(--brand);
      box-shadow: var(--focus-ring);
    }

    .currency {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px; color: var(--text-secondary);
      pointer-events: none;
      display: none; /* 값이 있을 때만 보여줄 수도 있음, 여기선 심플하게 생략하거나 조정 */
    }

    .clear-btn {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: var(--bg-body);
      border: none;
      border-radius: 50%;
      width: 24px; height: 24px;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      opacity: 0; pointer-events: none;
    }
    .clear-btn.visible { opacity: 1; pointer-events: auto; }
    .clear-btn:hover { background: var(--text-secondary); color: var(--bg-card); }

    /* Results */
    .result-list { display: flex; flex-direction: column; gap: 10px; }
    
    .result-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--bg-body); /* Subtle background */
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    /* Highlight Active Result */
    .result-card.primary {
      background: var(--brand-light);
      border-color: rgba(37, 99, 235, 0.1);
    }
    .result-card.primary .value { color: var(--brand); font-size: 20px; }

    .label-box { display: flex; flex-direction: column; gap: 2px; }
    .label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
    .value { font-size: 17px; font-weight: 700; color: var(--text-primary); }

    .copy-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .copy-btn:hover { border-color: var(--brand); color: var(--brand); }
    .copy-btn svg { width: 16px; height: 16px; fill: currentColor; }
    
    .copy-btn.copied {
      background: var(--success);
      border-color: var(--success);
      color: white;
      transform: scale(1.05);
    }

    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <h1>VAT Calculator</h1>
    <p class="subtitle">부가세 계산기 (원단위 절사)</p>
  </header>

  <div class="toggle-group" role="tablist">
    <div class="toggle-bg" id="toggle-bg"></div>
    <button class="toggle-btn" id="btn-total" onclick="switchMode('total')" role="tab" aria-selected="true">
      합계 금액
    </button>
    <button class="toggle-btn" id="btn-supply" onclick="switchMode('supply')" role="tab" aria-selected="false">
      공급가액
    </button>
  </div>

  <div class="input-area">
    <label id="input-label" for="amount">금액을 입력하세요</label>
    <div class="input-wrapper">
      <input type="text" id="amount" inputmode="numeric" placeholder="0" autocomplete="off">
      <button class="clear-btn" id="clear-btn" aria-label="지우기">✕</button>
    </div>
  </div>

  <div class="result-list">
    <div class="result-card" id="card-supply">
      <div class="label-box">
        <span class="label">공급가액</span>
        <span class="value" id="val-supply">0</span>
      </div>
      <button class="copy-btn" onclick="copyValue('val-supply', this)" aria-label="복사">
        <svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>
      </button>
    </div>

    <div class="result-card" id="card-vat">
      <div class="label-box">
        <span class="label">부가세 (10%)</span>
        <span class="value" id="val-vat">0</span>
      </div>
      <button class="copy-btn" onclick="copyValue('val-vat', this)" aria-label="복사">
        <svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>
      </button>
    </div>

    <div class="result-card primary" id="card-total">
      <div class="label-box">
        <span class="label">합계 금액</span>
        <span class="value" id="val-total">0</span>
      </div>
      <button class="copy-btn" onclick="copyValue('val-total', this)" aria-label="복사">
        <svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>
      </button>
    </div>
  </div>

  <footer>
    Customer Experience Tool
  </footer>
</div>

<script>
  let mode = 'total'; // 'total' | 'supply'
  const inputEl = document.getElementById('amount');
  const clearBtn = document.getElementById('clear-btn');
  const inputLabel = document.getElementById('input-label');
  const toggleBg = document.getElementById('toggle-bg');
  
  // Elements
  const els = {
    supply: document.getElementById('val-supply'),
    vat: document.getElementById('val-vat'),
    total: document.getElementById('val-total'),
    cardSupply: document.getElementById('card-supply'),
    cardTotal: document.getElementById('card-total')
  };

  // --- Logic & UX Functions ---

  function switchMode(newMode) {
    mode = newMode;
    const isTotal = mode === 'total';
    
    // 1. Toggle Button UI Animation
    toggleBg.style.transform = isTotal ? 'translateX(0)' : 'translateX(100%)';
    document.getElementById('btn-total').setAttribute('aria-selected', isTotal);
    document.getElementById('btn-supply').setAttribute('aria-selected', !isTotal);
    
    // 2. Update Label & Highlight
    inputLabel.textContent = isTotal ? '합계 금액 (부가세 포함)' : '공급가액 (부가세 별도)';
    
    // Highlight change logic
    if (isTotal) {
      els.cardTotal.classList.add('primary');
      els.cardSupply.classList.remove('primary');
    } else {
      els.cardSupply.classList.add('primary');
      els.cardTotal.classList.remove('primary');
    }
    
    calculate();
  }

  // Smart Input Formatting (Cursor Preservation)
  inputEl.addEventListener('input', function(e) {
    const rawValue = this.value.replace(/,/g, '');
    
    // 1. 커서 위치 저장 및 보정 준비
    // 현재 커서 위치까지의 '숫자' 개수를 셉니다.
    const cursor = this.selectionStart;
    const originalText = this.value;
    let digitsBeforeCursor = 0;
    for(let i=0; i<cursor; i++) {
      if (/[0-9]/.test(originalText[i])) digitsBeforeCursor++;
    }

    // 2. 값 포맷팅
    const numValue = parseInt(rawValue || '0', 10);
    if (!rawValue) {
      this.value = '';
      calculate();
      updateClearBtn(false);
      return;
    }
    
    const formatted = numValue.toLocaleString('ko-KR');
    this.value = formatted;
    
    // 3. 커서 위치 복원
    // 포맷팅 된 문자열에서 다시 앞에서부터 'digitsBeforeCursor'개의 숫자가 나오는 위치를 찾습니다.
    let newCursorPos = 0;
    let digitsFound = 0;
    for (let i=0; i<formatted.length; i++) {
      if (/[0-9]/.test(formatted[i])) digitsFound++;
      if (digitsFound >= digitsBeforeCursor) {
        newCursorPos = i + 1; // 현재 숫자 바로 뒤
        break;
      }
    }
    
    // 예외 처리 (지우기로 다 지웠을 때 등)
    if (rawValue.length > 0 && digitsBeforeCursor === 0) newCursorPos = 0; 
    
    this.setSelectionRange(newCursorPos, newCursorPos);
    updateClearBtn(true);
    calculate();
  });

  function updateClearBtn(show) {
    clearBtn.classList.toggle('visible', show);
  }
  
  clearBtn.addEventListener('click', () => {
    inputEl.value = '';
    inputEl.focus();
    updateClearBtn(false);
    calculate();
  });

  function calculate() {
    const raw = inputEl.value.replace(/,/g, '');
    const num = parseInt(raw || '0', 10);
    
    let supply = 0, vat = 0, total = 0;

    if (num > 0) {
      if (mode === 'total') {
        // 합계 기준: 나누기 1.1 후 내림
        supply = Math.floor(num / 1.1);
        vat = num - supply;
        total = num;
      } else {
        // 공급가 기준: 곱하기 0.1 후 내림
        supply = num;
        vat = Math.floor(num * 0.1);
        total = supply + vat;
      }
    }

    els.supply.textContent = supply.toLocaleString('ko-KR');
    els.vat.textContent = vat.toLocaleString('ko-KR');
    els.total.textContent = total.toLocaleString('ko-KR');
  }

  // UX: Visual Feedback for Copy
  async function copyValue(elementId, btnElement) {
    const text = document.getElementById(elementId).textContent.replace(/,/g, '');
    if(!text || text === '0') return;

    try {
      await navigator.clipboard.writeText(text);
      
      // Visual feedback
      btnElement.classList.add('copied');
      const originalIcon = btnElement.innerHTML;
      
      // Change to Checkmark Icon temporarily
      btnElement.innerHTML = `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`;
      
      setTimeout(() => {
        btnElement.classList.remove('copied');
        btnElement.innerHTML = originalIcon;
      }, 1500);
      
    } catch (err) {
      console.error('Copy failed', err);
    }
  }
</script>
</body>
</html>
